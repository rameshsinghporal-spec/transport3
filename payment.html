<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment - Transport Service</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        :root {
            --brand: #0d6efd;
            --soft: #f5f7fb;
            --card: #ffffff;
            --border: #e5e7eb;
            --muted: #6b7280;
        }

        body {
            background: var(--soft);
            font-family: system-ui, sans-serif;
            padding: 40px 0;
        }

        .notice {
            background: #fff3cd;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .payment-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .order-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .order-header h2 {
            font-weight: 800;
            color: #111827;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            color: var(--muted);
        }

        .step-item.active {
            color: var(--brand);
        }

        .step-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #e5e7eb;
            display: grid;
            place-items: center;
        }

        .active .step-num {
            background: var(--brand);
            color: white;
        }

        .card-payment {
            background: var(--card);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        .payment-header {
            padding: 30px;
            border-bottom: 1px solid var(--border);
        }

        .payment-body {
            padding: 30px;
        }

        .summary-box {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .qr-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .qr-frame {
            background: white;
            border: 2px solid var(--brand);
            border-radius: 20px;
            padding: 15px;
            display: inline-block;
        }

        .qr-frame img {
            width: 220px;
            border-radius: 10px;
        }

        .btn-submit {
            border-radius: 12px;
            padding: 15px;
            font-weight: 800;
            width: 100%;
            background: #198754;
            border: none;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container payment-container">

    <!-- DISCLAIMER -->
    <div class="notice text-center">
        This is a private assistance service and not affiliated with any government authority.
    </div>

    <div class="order-header">
        <h2>Order Form</h2>
    </div>

    <div class="step-indicator">
        <div class="step-item">
            <span class="step-num">1</span> Details
        </div>
        <div class="step-item active">
            <span class="step-num">2</span> Payment
        </div>
    </div>

    <div class="card-payment">
        <div class="payment-header">
            <h4 class="fw-bold">Payment</h4>
            <p class="text-muted">Scan QR & complete payment</p>
        </div>

        <div class="payment-body">

            <div class="summary-box">
                <div class="summary-row">
                    <span>Vehicle Type:</span>
                    <span id="vehicleTypeText">Two Wheeler</span>
                </div>
                <div class="summary-row text-primary">
                    <span>Total Payable:</span>
                    <span id="priceText">₹ 1099.00</span>
                </div>
            </div>

            <div class="qr-section">
                <p class="fw-bold">Scan & Pay</p>

                <!-- QR (UNCHANGED) -->
                <div class="qr-frame">
                    <img id="qrImg" src="images/1099.jpeg" alt="QR">
                </div>

                <br><br>
                <a href="#" onclick="downloadQR()">Download QR</a>
            </div>

            <form action="thank-you.html">
                <input type="text" class="form-control mb-3" placeholder="Transaction ID" required>
                <input type="file" class="form-control mb-3">
                <button class="btn-submit">Submit Order</button>
            </form>

        </div>
    </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const type = urlParams.get('type') || 'Two Wheeler';

const qrImg = document.getElementById('qrImg');
const priceText = document.getElementById('priceText');
const vehicleTypeText = document.getElementById('vehicleTypeText');

const config = {
    'Two Wheeler': '1099',
    'Three Wheeler': '1299',
    'Electric Vehicle': '1299',
    'Four Wheeler': '1499',
    'Heavy Vehicle': '1499',
    'Replacement': '1199'
};

// 🔥 AUTO QR FIX
function loadQR(code){
    qrImg.src = 'images/' + code + '.jpeg';
    qrImg.onerror = function(){
        qrImg.onerror = null;
        qrImg.src = 'images/' + code + '.png';
    }
}

const code = config[type] || '1099';
loadQR(code);

priceText.innerText = '₹ ' + code + '.00';
vehicleTypeText.innerText = type;

function downloadQR(){
    const link = document.createElement('a');
    link.href = qrImg.src;
    link.download = 'QR.jpeg';
    link.click();
}
</script>

</body>
</html>
