<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Site Closed</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .message {
      font-size: clamp(2rem, 8vw, 4.5rem);
      font-weight: 900;
      line-height: 1.2;
      max-width: 90%;
      padding: 30px;
    }
    .thanks {
      font-size: clamp(1.3rem, 5vw, 2.2rem);
      font-weight: 600;
      margin-top: 1.5rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div>
    <div class="message">This site has been closed</div>
    <div class="thanks">Thank you for your support</div>
  </div>
</body>
</html>
