<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transport Department - Vehicle HSRP Solutions</title>
  <meta name="description" content="Official vehicle transport solutions and HSRP booking services." />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --brand: #0d6efd;
      --brand2: #0aa2c0;
      --ink: #0b1220;
      --muted: #475569;
      --soft: #f5f7fb;
      --card: #ffffff;
      --border: #e5e7eb;
      --shadow: 0 10px 28px rgba(2, 6, 23, .08);
      --radius: 18px;
    }

    body {
      margin: 0;
      padding-top: 72px;
      background: var(--soft);
      color: var(--ink);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    /* ================= CLOSURE NOTICE ================= */
    .site-closed {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: rgba(0, 0, 0, 0.92);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      text-align: center;
      padding: 20px;
    }

    .closed-box {
      max-width: 800px;
      padding: 40px 30px;
      background: #dc3545;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(220, 53, 69, 0.5);
      border: 8px solid #fff;
    }

    .closed-box h1 {
      font-size: 4.5rem;
      font-weight: 900;
      margin: 0 0 20px;
      text-transform: uppercase;
      letter-spacing: -2px;
      line-height: 1;
    }

    .closed-box p {
      font-size: 1.6rem;
      font-weight: 600;
      margin: 0;
    }

    @media (max-width: 768px) {
      .closed-box h1 {
        font-size: 3.2rem;
      }
      .closed-box p {
        font-size: 1.3rem;
      }
    }

    /* ================= Original styles below (kept as is) ================= */
    .nav-glass {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1050;
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .brand-badge {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      letter-spacing: .04em;
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      box-shadow: 0 10px 22px rgba(13, 110, 253, .25);
      flex: 0 0 auto;
    }

    .navbar-brand {
      font-weight: 900;
      letter-spacing: .02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .navbar-nav .nav-link {
      font-weight: 700;
      color: var(--ink) !important;
    }

    .pill-cta {
      border-radius: 999px;
      padding: .55rem 1rem;
      font-weight: 900;
    }

    .section {
      padding: 32px 0;
    }

    .section-title {
      font-weight: 950;
      letter-spacing: -.01em;
      margin: 0 0 8px;
    }

    .section-sub {
      color: var(--muted);
      font-weight: 650;
      margin: 0 0 24px;
    }

    .card-soft {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      height: 100%;
    }

    /* ... rest of your original styles remain unchanged ... */

    /* (I didn't copy the entire 500+ lines of CSS here to keep the response clean, 
       but in your real file you keep everything below this comment as it was) */
  </style>
</head>

<body>

  <!-- ================= SITE CLOSED OVERLAY ================= -->
  <div class="site-closed">
    <div class="closed-box">
      <h1>This Site Has Been Closed</h1>
      <p>Service is no longer available. Thank you for your support.</p>
    </div>
  </div>

  <!-- ================= Your original content (now hidden behind the overlay) ================= -->
  <nav class="navbar navbar-expand-lg navbar-light nav-glass">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <span class="brand-badge">IN</span>
        <span>Transport Department</span>
      </a>
      <!-- ... rest of navbar ... -->
    </div>
  </nav>

  <section class="flag-section" id="services">
    <img src="images/advertisement_Test.jpg" alt="book my hsrp" title="book my hsrp">
  </section>

  <!-- ... all your other sections: service-strip, how it works, details, footer ... -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
