<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vehicle Registration Assistance</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f7fb;
    font-family:system-ui;
    padding:40px 0;
}
.container-box{
    max-width:650px;
    margin:auto;
}
.card{
    border-radius:20px;
    padding:25px;
}
.notice{
    background:#fff3cd;
    padding:10px;
    border-radius:8px;
    font-size:14px;
    margin-bottom:15px;
}
.btn-main{
    width:100%;
    padding:14px;
    border-radius:12px;
    font-weight:700;
}
</style>
</head>

<body>

<div class="container container-box">

<!-- 🔴 DISCLAIMER -->
<div class="notice">
This is a private assistance service and not affiliated with any government authority. 
Users can also apply directly on official government websites.
</div>

<div class="card shadow">

<h3 class="mb-3 text-center fw-bold">Booking Details</h3>

<form action="payment.html" method="GET">

<!-- VEHICLE -->
<div class="mb-3">
<label class="form-label">Vehicle Type*</label>
<select name="type" class="form-control" required>
<option value="">Select Vehicle</option>
<option>Two Wheeler</option>
<option>Three Wheeler</option>
<option>Four Wheeler</option>
<option>Electric Vehicle</option>
<option>Tractor & Trailer</option>
<option>Heavy Vehicle</option>
<option>Replacement</option>
</select>
</div>

<!-- NAME -->
<div class="mb-3">
<label class="form-label">Full Name*</label>
<input type="text" class="form-control" required>
</div>

<!-- MOBILE -->
<div class="mb-3">
<label class="form-label">Mobile Number*</label>
<input type="tel" class="form-control" required>
</div>

<!-- STATE -->
<div class="mb-3">
<label class="form-label">State*</label>
<select class="form-control" required>
<option value="">Select State</option>

<option>Andhra Pradesh</option>
<option>Arunachal Pradesh</option>
<option>Assam</option>
<option>Bihar</option>
<option>Chhattisgarh</option>
<option>Goa</option>
<option>Gujarat</option>
<option>Haryana</option>
<option>Himachal Pradesh</option>
<option>Jharkhand</option>
<option>Karnataka</option>
<option>Kerala</option>
<option>Madhya Pradesh</option>
<option>Maharashtra</option>
<option>Manipur</option>
<option>Meghalaya</option>
<option>Mizoram</option>
<option>Nagaland</option>
<option>Odisha</option>
<option>Punjab</option>
<option>Rajasthan</option>
<option>Sikkim</option>
<option>Tamil Nadu</option>
<option>Telangana</option>
<option>Tripura</option>
<option>Uttar Pradesh</option>
<option>Uttarakhand</option>
<option>West Bengal</option>

<option>Delhi</option>
<option>Jammu and Kashmir</option>
<option>Ladakh</option>
<option>Puducherry</option>
<option>Chandigarh</option>
<option>Lakshadweep</option>
<option>Andaman and Nicobar Islands</option>
<option>Dadra and Nagar Haveli and Daman and Diu</option>

</select>
</div>

<!-- CITY -->
<div class="mb-3">
<label class="form-label">City*</label>
<input type="text" class="form-control" placeholder="Enter your city" required>
</div>

<!-- ADDRESS -->
<div class="mb-3">
<label class="form-label">Full Address*</label>
<textarea class="form-control" rows="3" required></textarea>
</div>

<!-- CONSENT -->
<div class="form-check mb-3">
<input class="form-check-input" type="checkbox" required>
<label class="form-check-label">
I agree this is a private assistance service and charges are applicable.
</label>
</div>

<button type="submit" class="btn btn-primary btn-main">Proceed to Payment</button>

</form>

</div>
</div>

</body>
</html>
